<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#05010f" />
  <title>Space Invaders</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="game-shell">
    <div id="stage">
      <canvas id="game-canvas" width="800" height="900"></canvas>

      <!-- HUD -->
      <div id="hud" class="hidden">
        <div class="hud-group">
          <span class="hud-label">SCORE</span>
          <span id="hud-score" class="hud-value">0</span>
        </div>
        <div class="hud-group">
          <span class="hud-label">HI-SCORE</span>
          <span id="hud-highscore" class="hud-value">0</span>
        </div>
        <div class="hud-group">
          <span class="hud-label">LEVEL</span>
          <span id="hud-level" class="hud-value">1</span>
        </div>
        <div class="hud-group">
          <span class="hud-label">LIVES</span>
          <span id="hud-lives" class="hud-value lives">♥♥♥</span>
        </div>
        <div class="hud-group hud-buttons">
          <button id="btn-pause" class="hud-btn" title="Pause (P)">❚❚</button>
          <button id="btn-mute" class="hud-btn" title="Mute (M)">🔊</button>
          <button id="btn-crt" class="hud-btn" title="CRT filter">📺</button>
          <button id="btn-restart-hud" class="hud-btn" title="Restart">⟳</button>
        </div>
      </div>

      <!-- Overlays -->
      <div id="overlay" class="overlay">

        <!-- Start screen -->
        <div id="screen-start" class="screen active">
          <h1 class="title">SPACE<span>INVADERS</span></h1>
          <p class="subtitle">Defend Earth from the alien swarm</p>
          <button class="btn btn-primary" data-action="play">▶ PLAY</button>
          <div class="controls-guide">
            <h3>CONTROLS</h3>
            <div class="control-row"><span class="key">← →</span> / <span class="key">A</span> <span class="key">D</span><span class="desc">Move</span></div>
            <div class="control-row"><span class="key">SPACE</span><span class="desc">Fire</span></div>
            <div class="control-row"><span class="key">P</span><span class="desc">Pause</span></div>
            <div class="control-row"><span class="key">M</span><span class="desc">Mute</span></div>
          </div>
          <div class="volume-control">
            <span>🔊</span>
            <input type="range" id="volume-slider" min="0" max="100" value="60" />
          </div>
        </div>

        <!-- Pause screen -->
        <div id="screen-pause" class="screen">
          <h2 class="title-sm">PAUSED</h2>
          <button class="btn btn-primary" data-action="resume">▶ RESUME</button>
          <button class="btn" data-action="restart">⟳ RESTART</button>
        </div>

        <!-- Level complete -->
        <div id="screen-level" class="screen">
          <h2 class="title-sm">LEVEL <span id="level-cleared-num">1</span> CLEARED</h2>
          <div class="summary">
            <div class="summary-row"><span>Level Bonus</span><span id="level-bonus">0</span></div>
            <div class="summary-row"><span>Score</span><span id="level-score">0</span></div>
          </div>
          <button class="btn btn-primary" data-action="next-level">NEXT LEVEL →</button>
        </div>

        <!-- Game over -->
        <div id="screen-over" class="screen">
          <h2 class="title-sm gameover">GAME OVER</h2>
          <div class="summary">
            <div class="summary-row"><span>Final Score</span><span id="final-score">0</span></div>
            <div class="summary-row"><span>High Score</span><span id="final-highscore">0</span></div>
            <div class="summary-row"><span>Level Reached</span><span id="final-level">1</span></div>
          </div>
          <p id="new-record" class="new-record hidden">★ NEW HIGH SCORE! ★</p>
          <button class="btn btn-primary" data-action="play">↻ PLAY AGAIN</button>
        </div>
      </div>

      <!-- Mobile touch controls -->
      <div id="touch-controls" class="hidden">
        <div class="touch-left">
          <button id="touch-move-left" class="touch-btn">◀</button>
          <button id="touch-move-right" class="touch-btn">▶</button>
        </div>
        <div class="touch-right">
          <button id="touch-fire" class="touch-btn fire">●</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
