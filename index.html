<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Retro Games Hub — play classic browser-based games from your childhood, all in one neon arcade portal." />
  <meta name="theme-color" content="#0a0a12" />
  <title>Retro Games Hub</title>

  <!-- Favicon: retro game controller (inline SVG, no external request) -->
  <link
    rel="icon"
    type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a0a12'/%3E%3Cg fill='none' stroke='%2300f0ff' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M20 24h24a12 12 0 0 1 12 12 8 8 0 0 1-14.6 4.5l-1.2-1.7a4 4 0 0 0-3.3-1.8h-5.8a4 4 0 0 0-3.3 1.8l-1.2 1.7A8 8 0 0 1 8 36a12 12 0 0 1 12-12Z'/%3E%3Cpath d='M18 32h8M22 28v8'/%3E%3C/g%3E%3Cg fill='%23ff2e88'%3E%3Ccircle cx='42' cy='30' r='3'/%3E%3Ccircle cx='48' cy='36' r='3'/%3E%3C/g%3E%3C/svg%3E"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#games-grid">Skip to games</a>

  <header class="site-header">
    <h1 class="site-title">Retro&nbsp;Games&nbsp;Hub</h1>
    <p class="site-subtitle">Play classic games from your childhood directly in the browser.</p>

    <div class="controls">
      <div class="search-wrap">
        <label class="visually-hidden" for="search">Search games by name</label>
        <input
          id="search"
          class="search-input"
          type="search"
          placeholder="Search games…"
          autocomplete="off"
          aria-controls="games-grid"
        />
      </div>
      <p class="game-count" id="game-count" aria-live="polite"></p>
    </div>
  </header>

  <main>
    <!-- Tiles are generated dynamically from the `games` array in script.js -->
    <ul class="games-grid" id="games-grid" aria-label="Available games"></ul>

    <!-- Empty state, shown when a search matches nothing -->
    <p class="empty-state" id="empty-state" hidden>
      No games found. Try a different search.
    </p>
  </main>

  <footer class="site-footer">
    <p>Built with pure HTML, CSS &amp; JavaScript — no frameworks, no backend.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
