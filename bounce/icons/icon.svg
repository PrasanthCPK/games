<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1626"/>
      <stop offset="1" stop-color="#16324d"/>
    </linearGradient>
    <radialGradient id="ball" cx="38%" cy="34%" r="68%">
      <stop offset="0" stop-color="#ff8a9c"/>
      <stop offset="0.45" stop-color="#ff2e4d"/>
      <stop offset="1" stop-color="#b71530"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <circle cx="256" cy="262" r="150" fill="url(#ball)"/>
  <!-- rivets -->
  <g fill="rgba(0,0,0,0.18)">
    <circle cx="256" cy="180" r="18"/>
    <circle cx="338" cy="262" r="18"/>
    <circle cx="256" cy="344" r="18"/>
    <circle cx="174" cy="262" r="18"/>
  </g>
  <!-- highlight -->
  <ellipse cx="206" cy="212" rx="34" ry="22" fill="rgba(255,255,255,0.55)" transform="rotate(-34 206 212)"/>
  <!-- ground line -->
  <rect x="64" y="430" width="384" height="14" rx="7" fill="#37d98a" opacity="0.85"/>
</svg>
